<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runes Infinity</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1f2b 0%, #2a3142 100%);
      color: #f2f4f8; padding: 24px; line-height: 1.7;
    }
    .card {
      max-width: 480px; text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px; padding: 48px 36px;
      backdrop-filter: blur(8px);
    }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 20px;
      background: linear-gradient(135deg, #ff6b35, #ff9558);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; letter-spacing: 0.5px; }
    .tag { color: #9aa4b8; font-size: 0.95rem; margin-bottom: 28px; }
    p { color: #c5ccda; font-size: 0.95rem; }
    .foot { margin-top: 28px; font-size: 0.8rem; color: #6b7488; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">🏹</div>
    <h1>Runes Infinity</h1>
    <p class="tag">Indie game developer · 獨立遊戲開發者</p>
    <p>Maker of <strong>Unlimited Arrow</strong>, available on Google Play.</p>
    <p class="foot">Contact: infinityrunes01@gmail.com</p>
  </main>
</body>
</html>
